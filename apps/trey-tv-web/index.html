<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Fixed 1920px logical canvas for the 10-foot TV shell. The native
         WebView (useWideViewPort + loadWithOverviewMode) scales this to fit the
         screen 1:1, so the responsive layout renders at its intended size
         instead of a cramped ~960px device-width that oversizes/overlaps it. -->
    <meta name="viewport" content="width=1920" />
    <title>Trey TV Streaming Shell</title>
    <meta
      name="description"
      content="A premium TV app shell for Trey TV, designed to deliver a cinematic and engaging streaming experience on various smart TV platforms."
    />
    <link rel="icon" type="image/svg+xml" href="/placeholder.svg" />

    <meta property="og:title" content="Trey TV Streaming Shell" />
    <meta
      property="og:description"
      content="A premium TV app shell for Trey TV, designed to deliver a cinematic and engaging streaming experience on various smart TV platforms."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og.jpg" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
